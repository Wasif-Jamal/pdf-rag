services:
  app:
    build: .
    container_name: pdf-rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./app:/app/app

  redis:
    image: redis:7
    container_name: pdf-rag-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pdf-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: